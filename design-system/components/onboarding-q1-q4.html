<!-- @dsCard group="Onboarding" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Onboarding · Voice & Personality — In your own words (Q1/Q4)</title>
<link rel="stylesheet" href="../tokens/tokens.css" />
<link rel="stylesheet" href="../lib/base.css" />
<style>
  :root { --font-gotham: "Inter", "Helvetica Neue", Arial; } /* preview stand-in for the app's Gotham (next/font) */
  /* Plain paper — halftone ground removed 2026-07-09 (pattern rejected, Randall 2026-07-04). */
  body { margin: 0; background: var(--c-paper); font-family: var(--font-ui), Inter, system-ui, sans-serif;
    padding: var(--space-6) var(--space-5); }
  .wrap { max-width: 660px; margin: 0 auto; }

  .section { background-color: var(--c-paper-deep); border: var(--line-bold) solid var(--c-ink);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-card); padding: var(--space-5); }
  .sectionTitle { font-family: var(--font-display); font-size: var(--type-h2); color: var(--c-ink);
    margin: 0 0 var(--space-1); }
  .sectionLede { font-family: var(--font-ui), Inter, system-ui, sans-serif; font-size: var(--type-small);
    color: var(--role-text-muted); margin: 0 0 var(--space-5); line-height: 1.45; }

  .field { margin-bottom: var(--space-5); }
  .field:last-child { margin-bottom: 0; }
  .fieldHead { display: flex; align-items: baseline; gap: var(--space-3); margin-bottom: var(--space-2); }
  .fieldLabel { font-family: var(--font-subhead); text-transform: uppercase; letter-spacing: var(--tracking-subhead);
    font-size: var(--type-subhead); color: var(--c-ink); }
  .req { font-family: var(--font-ui), Inter, system-ui, sans-serif; font-size: var(--type-caption);
    color: var(--c-teal); }

  textarea { width: 100%; resize: vertical; min-height: 84px; box-sizing: border-box;
    font-family: var(--font-ui), Inter, system-ui, sans-serif; font-size: var(--type-body); color: var(--c-ink);
    line-height: 1.45; background: var(--c-paper); border: var(--line-reg) solid var(--c-ink);
    border-radius: var(--radius-md); padding: var(--space-3); }
  textarea.over { border-color: var(--c-tomato); }

  .meta { display: flex; align-items: center; gap: var(--space-3); margin-top: var(--space-2); }
  .limitNote { font-family: var(--font-ui), Inter, system-ui, sans-serif; font-size: var(--type-caption);
    color: var(--role-text-faint); }
  .limitNote.over { color: var(--c-tomato); }
</style>
</head>
<body>
<div class="wrap">
  <div class="section">
    <h2 class="sectionTitle">In your own words</h2>
    <p class="sectionLede">Two quick ones, in your voice. No right answer, no buzzwords. This is the substance the outreach leans on.</p>

    <div class="field">
      <div class="fieldHead">
        <span class="fieldLabel">What are you the person for?</span>
        <span class="req">required</span>
      </div>
      <textarea placeholder="When something specific goes sideways, what makes people come to you?"></textarea>
      <div class="meta"><span class="limitNote">120-word limit</span></div>
    </div>

    <div class="field">
      <div class="fieldHead">
        <span class="fieldLabel">A take you'll defend</span>
        <span class="req">required</span>
      </div>
      <textarea placeholder="An opinion about your field you'll stand behind, even if it's not the popular one."></textarea>
      <div class="meta"><span class="limitNote">120-word limit</span></div>
    </div>
  </div>
</div>
</body>
</html>
